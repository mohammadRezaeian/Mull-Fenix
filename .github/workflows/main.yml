name: Build Mull using FDroidServer

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code to build (leave default for official latest: Mull 133.0.3)'
        required: false
        default: 'auto'
        type: string
      architecture:
        description: 'Target architecture'
        required: false
        default: 'arm64'
        type: choice
        options:
        - arm64
        - armv7
        - x86

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - name: Checkout Mull-Fenix
      uses: actions/checkout@v4

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 python3-pip python3-venv \
          git mercurial subversion \
          openjdk-17-jdk-headless \
          build-essential \
          rsync \
          unzip \
          android-sdk-build-tools-common \
          apksigner

    - name: Install and setup Android SDK
      run: |
        mkdir -p /opt/android-sdk
        cd /opt/android-sdk
        
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        mkdir -p temp-cmdline-tools
        mv cmdline-tools/* temp-cmdline-tools/
        rm -rf cmdline-tools
        mkdir -p cmdline-tools/latest
        mv temp-cmdline-tools/* cmdline-tools/latest/
        rm -rf temp-cmdline-tools
        
        export ANDROID_HOME=/opt/android-sdk
        export ANDROID_SDK_ROOT=/opt/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        
        yes | sdkmanager --licenses || true
        
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "platforms;android-21"
        
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        mv android-ndk-r25c ndk
        
        echo "=== Android SDK verification ==="
        ls -la /opt/android-sdk/
        ls -la /opt/android-sdk/build-tools/
        
        sudo chown -R runner:runner /opt/android-sdk
        
        echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
        echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/opt/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

    - name: Install fdroidserver
      run: |
        python3 -m venv fdroid-env
        source fdroid-env/bin/activate
        pip install fdroidserver
        fdroid --version

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup fdroid environment
      run: |
        source fdroid-env/bin/activate
        
        rm -rf fdroid-build
        mkdir -p fdroid-build
        cd fdroid-build
        
        echo "=== Initializing fdroid repository ==="
        fdroid init --verbose || { echo "Init failed"; exit 1; }
        
        mkdir -p metadata
        
        echo "sdk_path: /opt/android-sdk" > config.yml
        echo "ndk_paths:" >> config.yml
        echo "  r25c: /opt/android-sdk/ndk" >> config.yml
        echo "build_tools: 33.0.2" >> config.yml
        echo "keystore: debug.keystore" >> config.yml
        echo "repo_keyalias: sova" >> config.yml
        echo "keypass: android" >> config.yml
        echo "keystorepass: android" >> config.yml
        echo "keydname: CN=Birdman, OU=Cell, O=Alcatraz, L=Alcatraz, S=California, C=US" >> config.yml

    - name: Get version information from config
      id: version_info
      run: |
        CONFIG_FILE=""
        for path in "./-fdroiddata/metadata/us.spotco.fennec_dos.yml" "../-fdroiddata/metadata/us.spotco.fennec_dos.yml" "./metadata/us.spotco.fennec_dos.yml"; do
          if [ -f "$path" ]; then
            CONFIG_FILE="$path"
            break
          fi
        done
        
        if [ -z "$CONFIG_FILE" ]; then
          if [ "${{ github.event.inputs.version_code }}" = "auto" ]; then
            echo "version_to_build=1330300200" >> $GITHUB_OUTPUT
          else
            echo "version_to_build=${{ github.event.inputs.version_code }}" >> $GITHUB_OUTPUT
          fi
          echo "official_version=133.0.3" >> $GITHUB_OUTPUT
        else
          CURRENT_VERSION=$(grep "CurrentVersion:" "$CONFIG_FILE" | sed "s/CurrentVersion://g" | tr -d " '" || echo "133.0.3")
          CURRENT_VERSION_CODE=$(grep "CurrentVersionCode:" "$CONFIG_FILE" | awk '{print $2}' 2>/dev/null || echo "1330300200")
          
          if [ "${{ github.event.inputs.version_code }}" = "auto" ]; then
            echo "version_to_build=$CURRENT_VERSION_CODE" >> $GITHUB_OUTPUT
          else
            echo "version_to_build=${{ github.event.inputs.version_code }}" >> $GITHUB_OUTPUT
          fi
          echo "official_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Prepare Mull build configuration
      env:
        GH_ARCHITECTURE: ${{ github.event.inputs.architecture }}
        VERSION_TO_BUILD: ${{ steps.version_info.outputs.version_to_build }}
        OFFICIAL_VERSION: ${{ steps.version_info.outputs.official_version }}
      run: |
        source fdroid-env/bin/activate
        cd fdroid-build
        mkdir -p metadata
        
        python3 -c "
        import os
        import yaml
        
        arch = os.environ.get('GH_ARCHITECTURE', 'arm64')
        v_code = int(os.environ.get('VERSION_TO_BUILD', '1330300200'))
        v_name = os.environ.get('OFFICIAL_VERSION', '133.0.3')
        
        if arch == 'arm64':
            gradle_task = 'assembleFenixNightlyArm64'
        elif arch == 'armv7':
            gradle_task = 'assembleFenixNightlyArmv7'
        else:
            gradle_task = 'assembleFenixNightlyX86'
            
        build_command = (
            'export RUST_ANDROID_GRADLE_TARGET_X86_64_LINUX_ANDROID_NDK_ROOT=\"$ANDROID_NDK\"\n'
            'export RUST_ANDROID_GRADLE_TARGET_I686_LINUX_ANDROID_NDK_ROOT=\"$ANDROID_NDK\"\n'
            'export RUST_ANDROID_GRADLE_TARGET_ARMV7_LINUX_ANDROIDEABI_NDK_ROOT=\"$ANDROID_NDK\"\n'
            'export RUST_ANDROID_GRADLE_TARGET_AARCH64_LINUX_ANDROID_NDK_ROOT=\"$ANDROID_NDK\"\n\n'
            '../../srclibs/rustup/rustup-init.sh -y\n'
            'source ~/.cargo/env\n'
            'rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android\n'
            'pushd ..\n'
            f'./gradlew {gradle_task} -x lintVitalFenixNightlyRelease\n'
            'popd\n'
        )
        
        data = {
            'Categories': ['Internet'],
            'License': 'MPL-2.0',
            'WebSite': 'https://divestos.org/pages/browsers#mull',
            'SourceCode': 'https://codeberg.org/divested-mobile/mull-fenix',
            'IssueTracker': 'https://codeberg.org/divested-mobile/mull-fenix/issues',
            'Changelog': 'https://codeberg.org/divested-mobile/mull-fenix/releases',
            'AutoName': 'Mull',
            'Summary': 'Privacy oriented web browser',
            'Description': 'A privacy oriented and deblobbed web browser based on Mozilla technology.\nIt enables many features upstreamed by the Tor Browser project.',
            'RepoType': 'local', # سوئیچ به حالت لوکال خالص برای حذف کامل خطاهای متادیتای گیت سرور
            'Repo': '/home/runner/work/Mull-Fenix/Mull-Fenix/fdroid-build/build/us.spotco.fennec_dos',
            'Builds': [{
                'versionName': v_name,
                'versionCode': v_code,
                'commit': '1.0',
                'subdir': 'android-components',
                'submodules': True,
                'ndk': 'r25c',
                'gradle': ['yes'],
                'srclibs': ['rustup@1.27.1'],
                'build': build_command
            }],
            'AutoUpdateMode': 'None',
            'UpdateCheckMode': 'None',
            'CurrentVersion': v_name,
            'CurrentVersionCode': v_code
        }
        
        with open('metadata/us.spotco.fennec_dos.yml', 'w') as f:
            yaml.dump(data, f, default_flow_style=False)
        "
        
        if [ -d "../-fdroiddata/" ]; then
          [ -d "../-fdroiddata/srclibs" ] && cp -r ../-fdroiddata/srclibs . 2>/dev/null || echo "No srclibs found"
        fi

    - name: Build Mull APK
      run: |
        source fdroid-env/bin/activate
        
        # کلون کدهای دانلود شده گیت‌هاب اکشنز درون مسیر بیلد محلی فدروید
        mkdir -p fdroid-build/build/us.spotco.fennec_dos
        rsync -a --exclude='fdroid-env' --exclude='fdroid-build' ./ fdroid-build/build/us.spotco.fennec_dos/
        
        cd fdroid-build
        set -x
        
        # هاردکد کردن مقدار ثابت متنی برای جلوگیری از ارور تایپ فدروید
        export SOURCE_DATE_EPOCH="1782285132"
        
        # اجرای بیلد محلی بدون باگ زنجیره‌ای گیت
        fdroid build -v --build-local --skip-scan -l us.spotco.fennec_dos:${{ steps.version_info.outputs.version_to_build }}
        BUILD_RESULT=$?
        set +x
        
        if [ $BUILD_RESULT -ne 0 ]; then
          echo "=== Build failed ==="
          exit 1
        fi

    - name: Find and prepare APKs
      id: find_apk
      run: |
        APK_PATH=$(find fdroid-build/ -name "*.apk" -type f | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        echo "Found APK at: $APK_PATH"
        NEW_NAME="mull-${{ github.event.inputs.architecture }}-$(date +%Y%m%d).apk"
        cp "$APK_PATH" "./$NEW_NAME"
        echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT

    - name: Check signing secrets
      id: check_secrets
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ]; then
          echo "signing_enabled=true" >> $GITHUB_OUTPUT
        else
          echo "signing_enabled=false" >> $GITHUB_OUTPUT
          echo "Warning: Signing secrets incomplete, skipping sign step."
        fi

    - name: Decode signing keystore
      if: steps.check_secrets.outputs.signing_enabled == 'true'
      run: |
        mkdir -p keystore
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/keystore.jks

    - name: Sign APK
      if: steps.check_secrets.outputs.signing_enabled == 'true'
      run: |
        APK_NAME="${{ steps.find_apk.outputs.apk_name }}"
        sudo apt-get install -y android-sdk-build-tools
        
        zipalign -v 4 "$APK_NAME" "${APK_NAME%.apk}-aligned.apk"
        
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-2-56 \
          -keystore keystore/keystore.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "${APK_NAME%.apk}-aligned.apk" "${{ secrets.KEY_ALIAS }}"
        
        jarsigner -verify -verbose "${APK_NAME%.apk}-aligned.apk"
        mv "${APK_NAME%.apk}-aligned.apk" "${APK_NAME%.apk}-signed.apk"

    - name: Upload unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: mull-unsigned-${{ github.event.inputs.architecture }}
        path: "${{ steps.find_apk.outputs.apk_name }}"
        retention-days: 30

    - name: Upload signed APK
      if: steps.check_secrets.outputs.signing_enabled == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mull-signed-${{ github.event.inputs.architecture }}
        path: "*-signed.apk"
        retention-days: 90

    - name: Build summary
      run: |
        echo "## Mull Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Build method: fdroidserver (official method)" >> $GITHUB_STEP_SUMMARY
        echo "- Version code to build: ${{ steps.version_info.outputs.version_to_build }}" >> $GITHUB_STEP_SUMMARY
        echo "- Official version: ${{ steps.version_info.outputs.official_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- Architecture: ${{ github.event.inputs.architecture }}" >> $GITHUB_STEP_SUMMARY
        echo "- APK name: ${{ steps.find_apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Architecture codes:" >> $GITHUB_STEP_SUMMARY
        echo "- ARMv7: version code ending in 0" >> $GITHUB_STEP_SUMMARY
        echo "- x86: version code ending in 1" >> $GITHUB_STEP_SUMMARY
        echo "- AArch64: version code ending in 2" >> $GITHUB_STEP_SUMMARY
